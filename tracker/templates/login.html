<!DOCTYPE html>
<html>
<head>

<title>Login - StudentSync</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background: linear-gradient(135deg,#5f9cff,#6c63ff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* LOGIN BOX */

.login-container{
background:white;
padding:40px;
border-radius:15px;
width:380px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

.login-container h2{
margin-bottom:25px;
color:#5f63ff;
}

/* INPUT GROUP */

.input-group{
margin-bottom:18px;
text-align:left;
}

.input-group label{
font-size:14px;
}

.input-group input{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
}

/* PASSWORD FIELD */

.password-field{
position:relative;
}

.password-field span{
position:absolute;
right:10px;
top:35px;
cursor:pointer;
}

/* BUTTON */

.login-btn{
width:100%;
padding:12px;
background:#5f63ff;
border:none;
color:white;
border-radius:25px;
font-size:16px;
cursor:pointer;
}

.login-btn:hover{
background:#4b50d1;
}

/* REGISTER LINK */

.register-link{
margin-top:15px;
font-size:14px;
}

.register-link a{
color:#5f63ff;
text-decoration:none;
font-weight:bold;
}

/* ERROR MESSAGE */

.error{
color:red;
margin-bottom:10px;
}

/* DARK MODE BUTTON POSITION */

.dark-toggle{
position:fixed;
top:20px;
right:20px;
z-index:1000;
}

#darkModeToggle{
display:none;
}

.toggle-label{
width:60px;
height:30px;
background:#4e73df;
border-radius:50px;
display:flex;
align-items:center;
justify-content:space-between;
padding:5px;
cursor:pointer;
position:relative;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.toggle-label i{
color:white;
font-size:12px;
}

.toggle-ball{
width:22px;
height:22px;
background:white;
border-radius:50%;
position:absolute;
left:4px;
transition:0.3s;
}

#darkModeToggle:checked + .toggle-label .toggle-ball{
transform:translateX(30px);
}

</style>

</head>

<body>

<div class="login-container">

<h2>Login to StudentSync</h2>

{% if messages %}
{% for message in messages %}
<div class="error">{{ message }}</div>
{% endfor %}
{% endif %}

<form method="POST">

{% csrf_token %}

<div class="input-group">
<label>Username</label>
<input type="text" name="username" required>
</div>

<div class="input-group password-field">
<label>Password</label>
<input type="password" name="password" id="password" required>
<span onclick="togglePassword('password')">👁</span>
</div>

<button class="login-btn">Login</button>

</form>

<div class="register-link">
Don't have an account? <a href="/register/">Register</a>
</div>

</div>

<script>

function togglePassword(fieldId){
var x = document.getElementById(fieldId);

if(x.type === "password"){
x.type = "text";
}else{
x.type = "password";
}
}

</script>


</body>
</html>
